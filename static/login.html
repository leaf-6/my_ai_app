<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>登录 - AI聊天机器人</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #e8ecf1 0%, #d5dce6 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .login-container {
            background: white;
            padding: 48px 40px 40px;
            border-radius: 20px;
            box-shadow: 0 12px 40px rgba(0,0,0,0.15);
            width: 380px;
            max-width: 95%;
        }
        .login-container h1 {
            font-size: 24px;
            font-weight: 700;
            color: #0f172a;
            text-align: center;
            margin-bottom: 8px;
        }
        .login-container .subtitle {
            text-align: center;
            color: #64748b;
            font-size: 14px;
            margin-bottom: 28px;
        }
        .form-group {
            margin-bottom: 18px;
        }
        .form-group label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            color: #1e293b;
            margin-bottom: 5px;
        }
        .form-group input {
            width: 100%;
            padding: 10px 14px;
            border: 1.5px solid #d0d7de;
            border-radius: 10px;
            font-size: 15px;
            outline: none;
            transition: border-color 0.2s;
        }
        .form-group input:focus {
            border-color: #1a73e8;
        }
        .btn {
            width: 100%;
            padding: 12px;
            background: #1a73e8;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn:hover { background: #1557b0; }
        .btn:disabled { background: #a0b8d4; cursor: not-allowed; }
        .error-msg {
            color: #e74c3c;
            font-size: 14px;
            text-align: center;
            margin-bottom: 12px;
            padding: 8px 12px;
            background: #fde8e8;
            border-radius: 8px;
            display: none;
        }
        .error-msg.show { display: block; }
        .toggle-text {
            text-align: center;
            margin-top: 16px;
            font-size: 14px;
            color: #64748b;
        }
        .toggle-text a {
            color: #1a73e8;
            cursor: pointer;
            text-decoration: none;
            font-weight: 500;
        }
        .toggle-text a:hover { text-decoration: underline; }
        .loading-spinner {
            display: none;
            text-align: center;
            margin-top: 10px;
            color: #64748b;
            font-size: 14px;
        }
        .loading-spinner.show { display: block; }
    </style>
</head>
<body>

<div class="login-container">
    <h1>🤖 AI 助手</h1>
    <p class="subtitle" id="formTitle">登录以继续使用</p>

    <div class="error-msg" id="errorMsg"></div>

    <form id="loginForm" onsubmit="return false;">
        <div class="form-group">
            <label for="username">用户名</label>
            <input type="text" id="username" placeholder="请输入用户名" required autofocus />
        </div>
        <div class="form-group">
            <label for="password">密码</label>
            <input type="password" id="password" placeholder="请输入密码（至少6位）" required />
        </div>
        <button type="submit" class="btn" id="submitBtn">登录</button>
    </form>

    <div class="loading-spinner" id="loadingSpinner">⏳ 处理中...</div>

    <div class="toggle-text">
        <span id="toggleText">还没有账号？</span>
        <a id="toggleLink">注册</a>
    </div>
</div>

<script>
    // ============================================================
    // 状态
    // ============================================================
    let isLoginMode = true;
    const API_BASE = 'http://127.0.0.1:8000';

    // DOM
    const formTitle = document.getElementById('formTitle');
    const submitBtn = document.getElementById('submitBtn');
    const toggleText = document.getElementById('toggleText');
    const toggleLink = document.getElementById('toggleLink');
    const errorMsg = document.getElementById('errorMsg');
    const loadingSpinner = document.getElementById('loadingSpinner');
    const usernameInput = document.getElementById('username');
    const passwordInput = document.getElementById('password');
    const loginForm = document.getElementById('loginForm');

    // ============================================================
    // 切换登录/注册模式
    // ============================================================
    function toggleMode() {
        isLoginMode = !isLoginMode;
        if (isLoginMode) {
            formTitle.textContent = '登录以继续使用';
            submitBtn.textContent = '登录';
            toggleText.textContent = '还没有账号？';
            toggleLink.textContent = '注册';
        } else {
            formTitle.textContent = '创建新账号';
            submitBtn.textContent = '注册';
            toggleText.textContent = '已有账号？';
            toggleLink.textContent = '登录';
        }
        errorMsg.classList.remove('show');
    }

    toggleLink.addEventListener('click', toggleMode);

    // ============================================================
    // 显示错误
    // ============================================================
    function showError(msg) {
        errorMsg.textContent = msg;
        errorMsg.classList.add('show');
    }

    function setLoading(loading) {
        submitBtn.disabled = loading;
        loadingSpinner.classList.toggle('show', loading);
    }

    // ============================================================
    // 格式化错误信息
    // ============================================================
    function formatError(data) {
        if (!data) return '未知错误';
        if (typeof data === 'string') return data;
        if (data.detail) {
            if (typeof data.detail === 'string') return data.detail;
            if (Array.isArray(data.detail)) {
                return data.detail.map(d => d.msg || d).join('; ');
            }
        }
        return '操作失败，请稍后重试';
    }

    // ============================================================
    // 提交表单
    // ============================================================
    loginForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        const username = usernameInput.value.trim();
        const password = passwordInput.value.trim();

        if (!username || !password) {
            showError('请输入用户名和密码');
            return;
        }

        if (!isLoginMode && password.length < 6) {
            showError('密码至少6位');
            return;
        }

        errorMsg.classList.remove('show');
        setLoading(true);

        try {
            const endpoint = isLoginMode ? '/api/login' : '/api/register';
            const response = await fetch(API_BASE + endpoint, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            });

            const data = await response.json();

            if (!response.ok) {
                throw new Error(formatError(data));
            }

            localStorage.setItem('ai_token', data.token);
            localStorage.setItem('ai_user_id', data.user_id);
            localStorage.setItem('ai_username', data.username);
            window.location.href = '/';

        } catch (err) {
            showError(err.message || '操作失败，请稍后重试');
        } finally {
            setLoading(false);
        }
    });

    // ============================================================
    // 回车触发提交
    // ============================================================
    passwordInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
            loginForm.dispatchEvent(new Event('submit'));
        }
    });

    // ============================================================
    // 检查是否已登录
    // ============================================================
    if (localStorage.getItem('ai_token')) {
        fetch(API_BASE + '/api/sessions', {
            headers: { 'Authorization': 'Bearer ' + localStorage.getItem('ai_token') }
        }).then(res => {
            if (res.ok) window.location.href = '/';
        }).catch(() => {});
    }
</script>
</body>
</html>
